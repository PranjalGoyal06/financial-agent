services:
  postgres:
    image: postgres:16-alpine
    container_name: scale-finance-postgres
    environment:
      POSTGRES_DB: scale_finance
      POSTGRES_USER: scale
      POSTGRES_PASSWORD: scale_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scale -d scale_finance"]
      interval: 5s
      timeout: 5s
      retries: 10

  chroma:
    image: chromadb/chroma:0.5.23
    container_name: scale-finance-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  postgres_data:
  chroma_data:
